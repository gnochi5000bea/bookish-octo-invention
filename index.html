<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Control</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="dark"] {
    --bg:           #0a0e17;
    --bg2:          #0e131d;
    --surface:      #121826;
    --surface2:     #161d2d;
    --surface3:     #1c2435;
    --row-hover:    rgba(56,130,246,0.05);
    --border:       rgba(255,255,255,0.05);
    --border-strong:rgba(255,255,255,0.10);
    --text:         #e8edf5;
    --text2:        rgba(232,237,245,0.55);
    --text3:        rgba(232,237,245,0.30);
    --blue:         #3b82f6;
    --blue-soft:    rgba(59,130,246,0.12);
    --green:        #22c55e;
    --amber:        #f59e0b;
    --red:          #ef4444;
    --purple:       #8b5cf6;
    --cyan:         #38bdf8;
    --teal:         #2dd4bf;
    --shadow:       0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
    --shadow-lg:    0 8px 28px rgba(0,0,0,0.5);
    --blur-bg:      rgba(10,14,23,0.8);
    --mono-bg:      rgba(0,0,0,0.3);
}

[data-theme="light"] {
    --bg:           #f4f6fa;
    --bg2:          #ffffff;
    --surface:      #ffffff;
    --surface2:     #f4f6fa;
    --surface3:     #e9edf3;
    --row-hover:    rgba(59,130,246,0.04);
    --border:       rgba(15,23,42,0.07);
    --border-strong:rgba(15,23,42,0.13);
    --text:         #0f172a;
    --text2:        rgba(15,23,42,0.55);
    --text3:        rgba(15,23,42,0.30);
    --blue:         #2563eb;
    --blue-soft:    rgba(37,99,235,0.10);
    --green:        #16a34a;
    --amber:        #d97706;
    --red:          #dc2626;
    --purple:       #7c3aed;
    --cyan:         #0891b2;
    --teal:         #0d9488;
    --shadow:       0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg:    0 8px 28px rgba(0,0,0,0.10);
    --blur-bg:      rgba(255,255,255,0.85);
    --mono-bg:      rgba(0,0,0,0.04);
}

html { -webkit-font-smoothing: antialiased; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    min-height: 100vh;
    transition: background 0.35s ease, color 0.35s ease;
}

/* ── NAVBAR ── */
nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--blur-bg);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.35s;
}

.nav-left { display: flex; align-items: center; gap: 16px; }
.nav-logo { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
.nav-right { display: flex; align-items: center; gap: 10px; }

.live-chip {
    display: flex; align-items: center; gap: 5px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: 6px; padding: 3px 9px 3px 7px;
    font-size: 11px; font-weight: 500; color: var(--green);
}
.live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: live 2s ease-in-out infinite; }
@keyframes live { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.theme-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; font-size: 15px;
    display: grid; place-items: center;
    transition: background 0.2s, transform 0.15s; flex-shrink: 0;
}
.theme-btn:hover { background: var(--surface3); transform: scale(1.05); }
.theme-btn:active { transform: scale(0.95); }

/* ── PAGE ── */
.page { max-width: 1280px; margin: 0 auto; padding: 32px 32px 64px; }

.page-header { margin-bottom: 22px; }
.page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text2); }

/* ── HEADER ── */
.page-header { margin-bottom: 22px; }
.page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text2); }
.page-count { font-size: 12px; color: var(--text3); margin-top: 8px; font-weight: 500; }

/* ── GLOBAL CONFIG PANEL ── */
.config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 18px 20px;
    margin-bottom: 20px;
}
.config-row { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
.config-field { display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
.config-field.grow { flex: 1; }
.config-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
    text-transform: uppercase; color: var(--text3);
}
.config-input {
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: inherit; font-size: 14px; color: var(--text);
    transition: border-color 0.15s;
}
.config-input:focus { outline: none; border-color: var(--blue); }
.config-save {
    background: var(--blue); color: #fff; border: none;
    border-radius: 8px; padding: 9px 20px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: filter 0.15s, transform 0.1s;
}
.config-save:hover { filter: brightness(1.1); }
.config-save:active { transform: scale(0.97); }
.config-save.saved { background: var(--green); }

/* multi-select */
.ms-wrap { position: relative; }
.ms-toggle {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: inherit; font-size: 14px; color: var(--text);
    cursor: pointer; transition: border-color 0.15s;
}
.ms-toggle:hover { border-color: var(--blue); }
.ms-summary { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
.ms-summary.has-sel { color: var(--text); }

.ms-menu {
    display: none;
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 50;
    overflow: hidden;
}
.ms-menu.open { display: block; }
.ms-search {
    width: 100%;
    background: var(--surface2);
    border: none; border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    font-family: inherit; font-size: 13px; color: var(--text);
}
.ms-search:focus { outline: none; }
.ms-options { max-height: 280px; overflow-y: auto; }
.ms-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    font-size: 13px; cursor: pointer;
    transition: background 0.1s;
}
.ms-option:hover { background: var(--row-hover); }
.ms-option .box {
    width: 17px; height: 17px; border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0; position: relative; transition: all 0.12s;
}
.ms-option.sel .box { background: var(--blue); border-color: var(--blue); }
.ms-option.sel .box::after {
    content: ''; position: absolute; left: 5px; top: 1px;
    width: 4px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}
.ms-empty { padding: 14px; text-align: center; color: var(--text3); font-size: 12px; }

.ms-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.ms-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--blue-soft); color: var(--blue);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 6px; padding: 3px 6px 3px 10px;
    font-size: 12px; font-weight: 500;
}
.ms-chip button {
    border: none; background: transparent; color: var(--blue);
    cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px;
    opacity: 0.7;
}
.ms-chip button:hover { opacity: 1; }

/* ── DATA GRID ── */
.grid-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }

thead th {
    text-align: left;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2px;
    color: var(--text2);
    padding: 15px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}

tbody td {
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
}

tbody tr { transition: background 0.12s; }
tbody tr:hover { background: var(--row-hover); }
tbody tr:last-child td { border-bottom: none; }
tbody tr.offline { opacity: 0.5; }

/* Column widths */
.col-check  { width: 60px; text-align: center; }
.col-user   { width: 240px; }
.col-hairs  { width: 120px; }
.col-island { width: 160px; }

/* Username cell */
.cell-user { display: flex; align-items: center; gap: 10px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.off { background: var(--text3); }
.user-name { font-weight: 600; letter-spacing: -0.1px; white-space: nowrap; }
.user-sub { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; }

/* Hairs badge */
.hairs-badge {
    display: inline-flex; align-items: center;
    background: rgba(139,92,246,0.14);
    color: var(--purple);
    font-weight: 600;
    font-size: 13px;
    padding: 4px 13px;
    border-radius: 6px;
}
.hairs-badge.zero { background: var(--surface3); color: var(--text3); }

/* Island */
.island-cell { color: var(--text2); white-space: nowrap; }

/* Checkbox */
.check {
    appearance: none; -webkit-appearance: none;
    width: 20px; height: 20px;
    border: 1.5px solid var(--border-strong);
    border-radius: 5px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
    vertical-align: middle;
}
.check:hover { border-color: var(--blue); }
.check:checked { background: var(--blue); border-color: var(--blue); }
.check:checked::after {
    content: '';
    position: absolute;
    left: 6px; top: 2px;
    width: 5px; height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

/* Teleport string + copy */
.col-tp { width: 300px; }
.tp-cell { display: flex; align-items: center; gap: 8px; }
.tp-code {
    flex: 1;
    min-width: 0;
    max-width: 200px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--text2);
    background: var(--mono-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 11px;
    white-space: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
}
.tp-code::-webkit-scrollbar { height: 5px; }
.tp-code::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.tp-code::-webkit-scrollbar-track { background: transparent; }
.tp-code.empty { color: var(--text3); font-style: italic; overflow: hidden; }

.copy-btn {
    flex-shrink: 0;
    border: 1px solid var(--border-strong);
    background: var(--surface3);
    color: var(--text2);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.copy-btn:hover { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.copy-btn:active { transform: scale(0.96); }
.copy-btn.copied { background: rgba(34,197,94,0.15); color: var(--green); border-color: rgba(34,197,94,0.4); }
.copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Hairs dropdown */
.col-drop { width: 110px; text-align: right; }

.drop-btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-strong);
    background: var(--surface3);
    color: var(--text2);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.drop-btn:hover { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.drop-btn.open { background: var(--blue-soft); color: var(--blue); border-color: var(--blue); }
.drop-caret { font-size: 10px; transition: transform 0.2s; }
.drop-btn.open .drop-caret { transform: rotate(180deg); }

.drop-row td { padding: 0; border-bottom: 1px solid var(--border); background: var(--bg2); }
.drop-row:hover { background: var(--bg2); }

.drop-panel { }

.drop-list {
    background: var(--bg2);
    max-height: 260px;
    overflow-y: auto;
}

.drop-item {
    display: flex;
    gap: 14px;
    font-size: 12px;
    padding: 9px 18px;
    border-bottom: 1px solid var(--border);
}
.drop-item:last-child { border-bottom: none; }
.drop-breed { color: var(--text); font-weight: 500; flex: 1; min-width: 120px; }
.drop-ind   { color: var(--amber); font-size: 11px; }
.drop-coat  { color: var(--cyan); }
.drop-mane  { color: var(--purple); }

.drop-empty {
    background: var(--bg2);
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    padding: 18px;
}

/* Empty state */
.empty { text-align: center; padding: 80px 20px; color: var(--text2); }
.empty h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty p { font-size: 14px; }

@media (max-width: 760px) {
    nav { padding: 0 16px; }
    .page { padding: 20px 16px 48px; }
    .col-island, .island-col-cell { display: none; }
}
</style>
</head>

<nav>

        <span class="nav-logo">Account Control</span>
        <div class="live-chip"><span class="live-dot"></span>Live</div>

                    <div class="ms-menu" id="msMenu">

                        <div class="ms-options" id="msOptions"></div>
                    </div>
                </div>
            </div>
            <button class="config-save" id="configSave">Save</button>
        </div>
        <div class="ms-chips" id="msChips"></div>
    </div>

    <div class="grid-wrap">
        <table>
            <thead>
                <tr>

</div>

    if (msMenu.classList.contains("open")) { msSearch.value = ""; msSearchTerm = ""; renderMsOptions(); msSearch.focus(); }
});
document.addEventListener("click", (e) => {
    if (!document.getElementById("msWrap").contains(e.target)) msMenu.classList.remove("open");
});
msSearch.addEventListener("input", () => { msSearchTerm = msSearch.value.toLowerCase(); renderMsOptions(); });

function renderMsOptions() {
    const term = msSearchTerm;
    const list = INDICATOR_OPTIONS.filter(o => o.toLowerCase().includes(term));
    if (!list.length) { msOptions.innerHTML = `<div class="ms-empty">No matches</div>`; return; }
    msOptions.innerHTML = list.map(o => {
        const sel = selectedIndicators.has(o) ? "sel" : "";
        const safe = o.replace(/"/g, "&quot;");
        return `<div class="ms-option ${sel}" data-val="${safe}"><span class="box"></span><span>${o}</span></div>`;
    }).join("");
    msOptions.querySelectorAll(".ms-option").forEach(el => {
        el.addEventListener("click", () => {
            const v = el.getAttribute("data-val");
            if (selectedIndicators.has(v)) selectedIndicators.delete(v);
            else selectedIndicators.add(v);
            renderMsOptions(); renderMsSummary();
        });
    });
}

function renderMsSummary() {
    const n = selectedIndicators.size;
    msSummary.textContent = n === 0 ? "Select indicators…" : n + " selected";
    msSummary.classList.toggle("has-sel", n > 0);
    const sorted = [...selectedIndicators].sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    msChips.innerHTML = sorted.map(v => {
        const safe = v.replace(/"/g, "&quot;");
        return `<span class="ms-chip">${v}<button data-val="${safe}" title="Remove">✕</button></span>`;
    }).join("");
    msChips.querySelectorAll("button").forEach(b => {
        b.addEventListener("click", () => {
            selectedIndicators.delete(b.getAttribute("data-val"));
            renderMsSummary();
            if (msMenu.classList.contains("open")) renderMsOptions();
        });
    });
}

async function loadGlobalConfig() {
    try {
        const r = await fetch("/api/global");
        if (r.ok) {
            const cfg = await r.json();
            targetPlayerInput.value = cfg.targetPlayer || "";
            selectedIndicators = new Set(Array.isArray(cfg.keepIndicators) ? cfg.keepIndicators : []);
            renderMsSummary();
        }
    } catch (e) {}
}

configSave.addEventListener("click", async () => {
    const payload = {
        targetPlayer: targetPlayerInput.value.trim(),
        keepIndicators: [...selectedIndicators],
    };
    try {
        await fetch("/api/global", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
        });
        const orig = configSave.textContent;
        configSave.textContent = "Saved";
        configSave.classList.add("saved");
        setTimeout(() => { configSave.textContent = orig; configSave.classList.remove("saved"); }, 1400);
    } catch (e) {}
});

loadGlobalConfig();

function online(a) { return a.timestamp && (Date.now() - a.timestamp) < OFFLINE; }

function hairList(acc) {
    if (!acc.indicators) return [];
    const out = [];
    for (const indName of Object.keys(acc.indicators)) {
        const arr = acc.indicators[indName];
        if (Array.isArray(arr)) {
            arr.forEach(a => out.push({ ...a, indicator: indName }));
        }
    }
    return out;
}

function uniqueHairCount(acc) {
    return hairList(acc).length;
}

function toggleDropdown(username) {
    openDropdown = (openDropdown === username) ? null : username;
    render();
}

function teleportString(jobId) {
    if (!jobId) return null;
    return `cloneref(game:GetService("TeleportService")):TeleportToPlaceInstance(${PLACE_ID}, "${jobId}", cloneref(game:GetService("Players")).LocalPlayer)`;
}

async function setTrade(username, enabled) {
    try {
        await fetch(`/api/config/${encodeURIComponent(username)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ trade: { enabled } })
        });
    } catch (e) {}
}

function copyTp(btn, jobId) {
    const str = teleportString(jobId);
    if (!str) return;
    navigator.clipboard.writeText(str).then(() => {
        const original = btn.textContent;
        btn.textContent = "Copied";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = original; btn.classList.remove("copied"); }, 1400);
    }).catch(() => {});
}

// Build the inner HTML for a single account's main row cells
function rowCellsHTML(name, acc) {
    const hairs = uniqueHairCount(acc);
    const tpStr = teleportString(acc.jobId);
    const checked = acc.tradeEnabled ? "checked" : "";
    const isOpen = openDropdown === name;
    return `
        <td class="col-check">
            <input type="checkbox" class="check" ${checked}
                onchange="setTrade('${name}', this.checked)" title="Toggle trade mode">
        </td>
        <td>
            <div class="cell-user">
                <span class="status-dot on"></span>
                <div>
                    <div class="user-name">${name}</div>
                    <div class="user-sub">${acc.status || "Running"}</div>
                </div>
            </div>
        </td>
        <td>
            <span class="hairs-badge ${hairs === 0 ? "zero" : ""}">${hairs}</span>
        </td>
        <td class="island-col-cell"><span class="island-cell">${acc.island || "—"}</span></td>
        <td>
            <div class="tp-cell">
                <span class="tp-code ${tpStr ? "" : "empty"}" title="${tpStr ? tpStr.replace(/"/g, "&quot;") : ""}">${tpStr || "No JobId reported"}</span>
                <button class="copy-btn" ${tpStr ? "" : "disabled"} onclick="copyTp(this, '${acc.jobId || ""}')">Copy</button>
            </div>
        </td>
        <td class="col-drop">
            <button class="drop-btn ${isOpen ? "open" : ""}" onclick="toggleDropdown('${name}')">
                <span class="drop-caret">▾</span>
            </button>
        </td>`;
}

// Build the inner HTML for an account's dropdown panel
function dropCellsHTML(acc) {
    const arr = hairList(acc);
    const body = arr.length
        ? `<div class="drop-list">${arr.map(a => `
                <div class="drop-item">
                    <span class="drop-breed">${a.breed || "?"}</span>
                    <span class="drop-ind">${a.indicator || "?"}</span>
                    <span class="drop-coat">${a.coat || "?"}</span>
                    <span class="drop-mane">${a.maneColor || "?"}</span>
                </div>`).join("")}</div>`
        : `<div class="drop-empty">No matching animals yet</div>`;
    return `<td colspan="6"><div class="drop-panel">${body}</div></td>`;
}

// Signature of the data that affects a row's main cells (skip DOM update if unchanged)
function rowSignature(name, acc) {
    return [
        name,
        acc.tradeEnabled ? 1 : 0,
        acc.status || "",
        acc.island || "",
        acc.jobId || "",
        uniqueHairCount(acc),
        openDropdown === name ? 1 : 0,
    ].join("|");
}

function render() {
    const tbody = document.getElementById("tbody");
    const entries = Object.entries(accounts).sort((a, b) => a[0].localeCompare(b[0]));
    const filtered = entries.filter(([name, a]) => online(a));

    document.getElementById("resultCount").textContent =
        filtered.length + " account" + (filtered.length !== 1 ? "s" : "") + " online";

    // Empty state
    if (!filtered.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="6"><div class="empty"><h2>No accounts online</h2><p>Waiting for status reports…</p></div></td></tr>`;
        return;
    }
    const emptyRow = tbody.querySelector(".empty-row");
    if (emptyRow) emptyRow.remove();

    const seen = new Set();

    filtered.forEach(([name, acc]) => {
        seen.add(name);
        let mainRow = tbody.querySelector(`tr.acc-row[data-name="${CSS.escape(name)}"]`);
        let dropRow = tbody.querySelector(`tr.drop-row[data-name="${CSS.escape(name)}"]`);

        // Create main row if missing
        if (!mainRow) {
            mainRow = document.createElement("tr");
            mainRow.className = "acc-row";
            mainRow.dataset.name = name;
            mainRow.innerHTML = rowCellsHTML(name, acc);
            mainRow.dataset.sig = rowSignature(name, acc);
            tbody.appendChild(mainRow);
        } else {
            // Only re-render the cells if data changed
            const sig = rowSignature(name, acc);
            if (mainRow.dataset.sig !== sig) {
                mainRow.innerHTML = rowCellsHTML(name, acc);
                mainRow.dataset.sig = sig;
            }
        }

        const shouldShowDrop = openDropdown === name;

        // Manage dropdown row
        if (shouldShowDrop) {
            const dropSig = "open|" + uniqueHairCount(acc);
            if (!dropRow) {
                dropRow = document.createElement("tr");
                dropRow.className = "drop-row";
                dropRow.dataset.name = name;
                dropRow.innerHTML = dropCellsHTML(acc);
                dropRow.dataset.sig = dropSig;
                mainRow.after(dropRow);
            } else if (dropRow.dataset.sig !== dropSig) {
                // Only rebuild dropdown contents when the hair data changed
                dropRow.innerHTML = dropCellsHTML(acc);
                dropRow.dataset.sig = dropSig;
            }
        } else if (dropRow) {
            dropRow.remove();
        }
    });

    // Remove rows for accounts no longer present/online
    tbody.querySelectorAll("tr.acc-row").forEach(tr => {
        if (!seen.has(tr.dataset.name)) {
            const dr = tbody.querySelector(`tr.drop-row[data-name="${CSS.escape(tr.dataset.name)}"]`);
            if (dr) dr.remove();
            tr.remove();
        }
    });

    // Keep rows in sorted order (move any out-of-place rows)
    let cursor = null;
    filtered.forEach(([name]) => {
        const mainRow = tbody.querySelector(`tr.acc-row[data-name="${CSS.escape(name)}"]`);
        const dropRow = tbody.querySelector(`tr.drop-row[data-name="${CSS.escape(name)}"]`);
        if (cursor === null) {
            if (tbody.firstChild !== mainRow) tbody.insertBefore(mainRow, tbody.firstChild);
        } else {
            if (cursor.nextSibling !== mainRow) tbody.insertBefore(mainRow, cursor.nextSibling);
        }
        cursor = mainRow;
        if (dropRow) {
            if (cursor.nextSibling !== dropRow) tbody.insertBefore(dropRow, cursor.nextSibling);
            cursor = dropRow;
        }
    });
}

// Re-render just toggles a dropdown without rebuilding the table
function applyDropdownToggle() { render(); }

async function poll() {
    try {
        const r = await fetch("/api/accounts");
        if (r.ok) { accounts = await r.json(); render(); }
    } catch(e) {}
}

poll();
setInterval(poll, 3000);
</script>
